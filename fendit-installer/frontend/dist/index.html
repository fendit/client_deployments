<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fendit Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    * { -webkit-font-smoothing: antialiased; }

    /* Wails drag region */
    [data-drag] { --wails-draggable: drag; }

    /* Prevent drag on interactive elements */
    input, button, a { --wails-draggable: no-drag; }

    /* Code input */
    .code-input {
      font-family: 'Courier New', monospace;
      letter-spacing: 0.45em;
      caret-color: #818cf8;
    }
    .code-input::placeholder { letter-spacing: 0.15em; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

    /* Pulse badge */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(99,102,241,.4); }
      70% { box-shadow: 0 0 0 12px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    .pulse { animation: pulse-ring 2s ease-out infinite; }
  </style>
</head>
<body class="bg-[#0d0d17] text-white overflow-hidden select-none" style="height:100vh;">

  <!-- Drag handle (top strip) -->
  <div class="h-8 w-full" data-drag></div>

  <!-- Minimal window control -->
  <button
    onclick="window.runtime.Quit()"
    class="absolute top-2.5 right-3 w-3 h-3 rounded-full bg-[#3a3a4a] hover:bg-red-500 transition-colors duration-150"
    title="Close">
  </button>

  <!-- Main layout -->
  <div class="flex flex-col items-center px-10" style="padding-top: 8px;">

    <!-- Shield logo -->
    <div class="mb-5">
      <svg width="52" height="60" viewBox="0 0 52 60" fill="none">
        <path d="M26 0L0 11V30C0 46.6 11.4 58.5 26 60C40.6 58.5 52 46.6 52 30V11L26 0Z"
              fill="url(#shieldGrad)"/>
        <path d="M18 30L23 35L34 22" stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="shieldGrad" x1="0" y1="0" x2="52" y2="60" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1 class="text-[22px] font-bold tracking-tight mb-0.5">Fendit Security</h1>
    <p class="text-[11px] text-gray-500 uppercase tracking-[0.18em] mb-7">Endpoint Protection</p>

    <!-- ── INPUT STATE ───────────────────────────────────────────── -->
    <div id="stateInput" class="w-full">
      <label class="block text-[10px] text-gray-500 uppercase tracking-[0.2em] mb-2 ml-0.5">
        Activation Code
      </label>

      <input
        id="codeInput"
        type="text"
        maxlength="6"
        placeholder="XXXXXX"
        autocomplete="off"
        spellcheck="false"
        class="code-input w-full bg-[#13131f] border border-[#2a2a3d] rounded-xl
               px-4 py-4 text-center text-[26px] font-bold text-white
               placeholder-[#2e2e42]
               focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/60
               transition-all duration-150 uppercase"
        oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
        onkeydown="if(event.key==='Enter') activate()"
      />

      <button
        id="activateBtn"
        onclick="activate()"
        class="mt-3 w-full py-3.5 rounded-xl font-semibold text-[13px] uppercase
               tracking-[0.14em] transition-all duration-150
               bg-gradient-to-r from-indigo-600 to-violet-600
               hover:from-indigo-500 hover:to-violet-500
               active:scale-[0.98] active:brightness-90
               disabled:opacity-40 disabled:cursor-not-allowed">
        Activate
      </button>

      <!-- Error panel (lives inside input state) -->
      <div id="errorPanel"
           class="hidden mt-3 p-3.5 bg-red-950/40 border border-red-900/60 rounded-xl">
        <p class="text-[10px] text-red-400 uppercase tracking-widest font-semibold mb-1">Error</p>
        <p id="errorText" class="text-[12px] text-red-300 leading-relaxed whitespace-pre-wrap"></p>
        <button onclick="resetError()"
                class="mt-2 text-[11px] text-gray-600 hover:text-gray-400 underline underline-offset-2">
          Try again
        </button>
      </div>
    </div>

    <!-- ── LOADING STATE ─────────────────────────────────────────── -->
    <div id="stateLoading" class="hidden w-full text-center">
      <div class="flex flex-col items-center gap-4">
        <!-- Animated shield during load -->
        <div class="relative w-16 h-16 flex items-center justify-center">
          <div class="absolute inset-0 rounded-full border-2 border-indigo-600/20 spin"></div>
          <div class="absolute inset-1 rounded-full border-2 border-t-indigo-500 border-transparent spin"
               style="animation-duration:0.7s"></div>
          <svg width="28" height="32" viewBox="0 0 52 60" fill="none" class="relative z-10">
            <path d="M26 0L0 11V30C0 46.6 11.4 58.5 26 60C40.6 58.5 52 46.6 52 30V11L26 0Z"
                  fill="url(#sg2)"/>
            <path d="M18 30L23 35L34 22" stroke="white" stroke-width="3"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="sg2" x1="0" y1="0" x2="52" y2="60" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <p id="phaseText" class="text-[13px] text-gray-300">Connecting...</p>
          <p class="text-[11px] text-gray-600 mt-1">This may take a few minutes</p>
        </div>
      </div>
    </div>

    <!-- ── SUCCESS STATE ─────────────────────────────────────────── -->
    <div id="stateSuccess" class="hidden w-full text-center">
      <div class="flex flex-col items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-emerald-500/15 flex items-center justify-center pulse">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <div>
          <p class="text-[18px] font-bold text-emerald-400 mb-1">Protection Active</p>
          <p class="text-[12px] text-gray-400">Your endpoint is now secured by Fendit.</p>
          <p class="text-[11px] text-gray-600 mt-3">Closing automatically...</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <p class="absolute bottom-4 w-full text-center text-[10px] text-[#272738]">
    support@fendit.eu
  </p>

  <!-- Wails runtime -->
  <script src="/wails/runtime.js"></script>
  <script>
    const { EventsOn, Quit } = window.runtime;

    function activate() {
      const code = document.getElementById('codeInput').value.trim();
      if (code.length !== 6) {
        showError('Enter your complete 6-character activation code.');
        return;
      }
      setState('loading');

      EventsOn('phase', msg => {
        document.getElementById('phaseText').textContent = msg;
      });

      window.go.main.App.Activate(code)
        .then(result => {
          if (result.success) {
            setState('success');
            setTimeout(Quit, 3000);
          } else {
            setState('input');
            showError(result.error || 'An unexpected error occurred.');
          }
        })
        .catch(err => {
          setState('input');
          showError('Unexpected error: ' + String(err));
        });
    }

    function setState(s) {
      document.getElementById('stateInput').classList.toggle('hidden', s !== 'input');
      document.getElementById('stateLoading').classList.toggle('hidden', s !== 'loading');
      document.getElementById('stateSuccess').classList.toggle('hidden', s !== 'success');
      if (s === 'input') document.getElementById('errorPanel').classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorPanel').classList.remove('hidden');
    }

    function resetError() {
      document.getElementById('errorPanel').classList.add('hidden');
      document.getElementById('codeInput').value = '';
      document.getElementById('codeInput').focus();
    }

    window.addEventListener('load', () => document.getElementById('codeInput').focus());
  </script>
</body>
</html>
