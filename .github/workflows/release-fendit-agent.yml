name: Release Fendit

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # arm64 runner — matches the darwin/arm64 native slice in build_all.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # fendit-agent requires Go 1.25.0; fendit-installer requires 1.22.0.
          # Using the agent's go.mod ensures the higher version satisfies both.
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: |
            fendit-agent/go.sum
            fendit-installer/go.sum

      - name: Install mingw-w64
        # Cross-compilation toolchain for the Windows installer and agent.
        run: brew install mingw-w64

      - name: Build all targets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/windows/fendit_base.exe
            release/osx/fendit_base.pkg
