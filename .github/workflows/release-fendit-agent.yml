name: Release Fendit

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # arm64 runner — matches the darwin/arm64 target in build_all.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: fendit-agent/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Wails CLI
        # Pinned to match fendit-installer/go.mod. v2.9.2 had a compile error
        # with Go 1.22+ ("invalid array length -delta * delta") in the CLI itself.
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install mingw-w64 (Windows cross-compile toolchain)
        run: brew install mingw-w64

      - name: Build all targets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/windows/fendit_base.exe
            release/osx/fendit_base.pkg
