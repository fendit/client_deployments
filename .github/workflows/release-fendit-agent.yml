name: Release Fendit

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # arm64 runner — matches the darwin/arm64 target in build_all.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: fendit-agent/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fendit-installer/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Install mingw-w64 (Windows cross-compile toolchain)
        run: brew install mingw-w64

      - name: Build all targets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/windows/fendit_base.exe
            release/osx/fendit_base.pkg
