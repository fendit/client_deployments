name: Release Fendit

on:
  push:
    branches:
      - main  # Trigger automatisch bij elke push naar main!

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Genereer automatisch een nieuwe tag (bijv. v1.0.9 -> v1.0.10)
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch  # Verhoogt standaard het laatste getal

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: |
            fendit-agent/go.sum
            fendit-installer/go.sum

      - name: Install mingw-w64
        run: brew install mingw-w64

      - name: Build all targets
        env:
          # Geef de automatisch gegenereerde versie door aan je bash script
          VERSION: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Koppel de release aan de zojuist gemaakte tag
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            release/windows/fendit_base.exe
            release/osx/fendit_base.pkg
