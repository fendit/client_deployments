name: Release Fendit

on:
  push:
    branches:
      - main  # Trigger automatisch bij elke push naar main!

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0

      # Bump patch version inline — replaces mathieudutour/github-tag-action
      # (that action is still on Node 20 with no Node 24 release available)
      - name: Bump version and push tag
        id: tag_version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: |
            fendit-agent/go.sum
            fendit-installer/go.sum

      - name: Install mingw-w64
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install mingw-w64

      - name: Build all targets
        env:
          VERSION: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            release/windows/fendit_installer.exe
            release/osx/fendit_installer.pkg
