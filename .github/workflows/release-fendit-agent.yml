name: Release Fendit Agent

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: fendit-agent/go.mod
          cache-dependency-path: fendit-agent/go.sum

      - name: Build all targets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x build_all.sh
          ./build_all.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/windows/fendit_base.exe
            release/osx/fendit_base.pkg
